# Virginia Beach rental finder configuration

city: "Virginia Beach"
state: "VA"
state_full: "Virginia"

rent:
  min: 2300
  max: 3300

# Single-family houses only.
property_types:
  allow:
    - single_family
    - house
  deny:
    - townhouse
    - condo
    - apartment
    - duplex
    - mobile
    - manufactured
    - multi_family
    - co_op

# Approximate Virginia Beach zip codes. Used for filtering & verification.
zips:
  - "23451"
  - "23452"
  - "23453"
  - "23454"
  - "23455"
  - "23456"
  - "23457"
  - "23459"
  - "23460"
  - "23461"
  - "23462"
  - "23464"
  - "23466"
  - "23467"
  - "23471"
  - "23479"

http:
  rate_limit_seconds: 2.0
  timeout_seconds: 30
  max_retries: 3
  user_agent: "vb-rental-finder/0.1 (+personal use; contact via repo)"

# Used for the Nominatim User-Agent (their ToS asks for contact info).
# Renamed from contact_email to contact since a profile URL works fine here
# and avoids putting a personal email in a public repo.
contact: "https://github.com/borgesw26"

# Shared seen/favorited state in state.json on this same repo.
# The browser fetches it from raw.githubusercontent.com (no auth) and writes
# back via the GitHub Contents API using the user's fine-grained PAT.
sync:
  github_owner: "borgesw26"
  github_repo: "vb-rental-finder"
  branch: "main"
  state_file: "state.json"

playwright:
  headless: true
  slow_mo_ms: 250
  default_timeout_ms: 45000

paths:
  db: "listings.db"
  out_dir: "out"
  docs_dir: "docs"        # GitHub Pages serves from here
  photos_dir: "docs/photos"

sources:
  realtor:
    enabled: true
  zillow:
    enabled: true
  redfin:
    enabled: true
  homesdotcom:
    enabled: true
  craigslist:
    enabled: true
